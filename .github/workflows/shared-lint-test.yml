name: Shared Lint & Test

on:
  workflow_call:
    inputs:
      DETECTED_LANG:
        description: 'Lenguaje detectado del proyecto'
        required: true
        type: string
      CONTEXT_DIR:
        description: 'Directorio del contexto'
        required: true
        type: string

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run lint
        working-directory: ${{ inputs.CONTEXT_DIR }}
        run: |
          case "${{ inputs.DETECTED_LANG }}" in
            go)
              echo "🐹 Instalando Go y golangci-lint..."
              sudo apt-get install -y --no-install-recommends golang curl
              curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin
              echo "🔍 Ejecutando golangci-lint..."
              golangci-lint run ./... --timeout 5m || true
              ;;
            js)
              echo "📦 Configurando Node.js..."
              sudo apt-get install -y --no-install-recommends nodejs npm
              npm ci --prefer-offline --no-audit 2>/dev/null || npm install --no-audit
              if grep -q '"lint"' package.json 2>/dev/null; then
                npm run lint || true
              else
                echo "ℹ️ No hay script 'lint' en package.json"
              fi
              ;;
            python)
              echo "🐍 Instalando linters Python..."
              sudo apt-get install -y --no-install-recommends python3 python3-pip
              pip install --quiet --break-system-packages flake8 black 2>/dev/null || true
              flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
              black --check --diff . 2>/dev/null || true
              ;;
            java-*)
              echo "☕ Lint Java no configurado por defecto. Usa SonarQube."
              ;;
            *)
              echo "⚠️ Lenguaje no detectado. Omitiendo lint."
              ;;
          esac

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Java)
        if: ${{ startsWith(inputs.DETECTED_LANG, 'java') }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Go
        if: ${{ inputs.DETECTED_LANG == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up Node.js
        if: ${{ inputs.DETECTED_LANG == 'js' }}
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up Python
        if: ${{ inputs.DETECTED_LANG == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tests
        working-directory: ${{ inputs.CONTEXT_DIR }}
        run: |
          case "${{ inputs.DETECTED_LANG }}" in
            go)
              echo "🧪 go test..."
              go test ./... -v -coverprofile=coverage.out || true
              if [ -f coverage.out ]; then go tool cover -func=coverage.out; fi
              ;;
            js)
              npm ci --prefer-offline --no-audit 2>/dev/null || npm install --no-audit
              echo "🧪 npm test..."
              if npx jest --version 2>/dev/null; then
                npx jest --coverage --passWithNoTests --ci || true
              else
                npm test || true
              fi
              ;;
            python)
              if [ -f requirements.txt ]; then pip install --quiet -r requirements.txt 2>/dev/null || true; fi
              pip install --quiet pytest pytest-cov 2>/dev/null || true
              echo "🧪 pytest..."
              pytest --cov --cov-report=xml:coverage.xml --cov-report=term -v || true
              ;;
            java-maven)
              echo "🧪 mvn test..."
              mvn test -B -Dmaven.test.failure.ignore=true || true
              ;;
            java-gradle)
              if [ -f gradlew ]; then chmod +x gradlew; ./gradlew test --continue || true
              else gradle test --continue || true; fi
              ;;
            *)
              echo "⚠️ Lenguaje no detectado. Omitiendo tests."
              ;;
          esac

      - name: Generate Coverage DX Summary
        if: always()
        working-directory: ${{ inputs.CONTEXT_DIR }}
        run: |
          echo "## 🧪 Resultados de Tests y Cobertura" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "coverage.out" ]; then
            echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
            TOTAL_COV=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' || echo "N/A")
            echo "| Cobertura Go (Total) | $TOTAL_COV |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Lenguaje detectado:** Go" >> $GITHUB_STEP_SUMMARY
          elif [ -f "coverage/lcov-report/index.html" ] || [ -f "coverage/clover.xml" ]; then
            echo "✅ **Lenguaje detectado:** Javascript/Typescript" >> $GITHUB_STEP_SUMMARY
            echo "Puedes descargar el artefacto \`coverage-reports\` para ver el reporte LCOV detallado." >> $GITHUB_STEP_SUMMARY
          elif [ -f "coverage.xml" ]; then
            echo "✅ **Lenguaje detectado:** Python" >> $GITHUB_STEP_SUMMARY
            echo "Puedes descargar el artefacto \`coverage-reports\` para ver el reporte XML detallado." >> $GITHUB_STEP_SUMMARY
          elif [ -d "target/site/jacoco" ]; then
            echo "✅ **Lenguaje detectado:** Java (Maven/Gradle)" >> $GITHUB_STEP_SUMMARY
            echo "Puedes descargar el artefacto \`coverage-reports\` para abrir Jacoco." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No se encontraron reportes de cobertura automatizados estándar." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            ${{ inputs.CONTEXT_DIR }}/coverage.out
            ${{ inputs.CONTEXT_DIR }}/coverage.xml
            ${{ inputs.CONTEXT_DIR }}/coverage/
            ${{ inputs.CONTEXT_DIR }}/target/site/jacoco/
            ${{ inputs.CONTEXT_DIR }}/build/reports/jacoco/
          retention-days: 7
          if-no-files-found: ignore
