name: 🐳 Docker Build, Push & Scan (Auto)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

  workflow_call:
    inputs:
      CONTEXT_DIR:
        description: 'Directorio del código fuente para evaluación del lenguage (eg pom.xml)'
        required: false
        default: '.'
        type: string
      DOCKERFILE_PATH:
        description: 'Ruta relativa al Dockerfile (ej. ./Dockerfile o ./log_processor/Dockerfile)'
        required: false
        default: './Dockerfile'
        type: string
    secrets:
      REGISTRY:
        required: false
      REGISTRY_USER:
        required: false
      REGISTRY_PASSWORD:
        required: false
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      DOCKERHUB_REPO:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.REGISTRY || 'ghcr.io' }}
  CONTEXT_DIR: ${{ inputs.CONTEXT_DIR || '.' }}
  DOCKERFILE_PATH: ${{ inputs.DOCKERFILE_PATH || './Dockerfile' }}
  PLATFORMS: linux/amd64,linux/arm64
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  detect-language:
    name: 🔍 Detect Language & Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      detected_lang: ${{ steps.detect.outputs.detected_lang }}
      app_version:   ${{ steps.detect.outputs.app_version }}
      image_tag:     ${{ steps.detect.outputs.image_tag }}
      repo_lc:       ${{ steps.detect.outputs.repo_lc }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect language
        id: detect
        working-directory: ${{ env.CONTEXT_DIR }}
        run: |
          echo "🔍 Detectando lenguaje del proyecto..."
          LANG="unknown"
          APP_VERSION="${{ github.run_number }}"

          if [ -f "go.mod" ]; then
            LANG="go"
            echo "🐹 Go detectado (go.mod)"
          elif [ -f "pom.xml" ]; then
            LANG="java-maven"
            APP_VERSION=$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>(.*)<\/version>.*/\1/' || echo "$APP_VERSION")
            echo "☕ Java Maven detectado (pom.xml)"
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            LANG="java-gradle"
            echo "☕ Java Gradle detectado"
          elif [ -f "package.json" ]; then
            LANG="js"
            APP_VERSION=$(grep '"version"' package.json | head -1 | sed -E 's/.*"version"\s*:\s*"([^"]+)".*/\1/' || echo "$APP_VERSION")
            echo "📦 JavaScript/TypeScript detectado (package.json)"
          elif [ -f "pyproject.toml" ]; then
            LANG="python"
            APP_VERSION=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*=\s*"([^"]+)".*/\1/' || echo "$APP_VERSION")
            echo "🐍 Python detectado (pyproject.toml)"
          elif [ -f "requirements.txt" ]; then
            LANG="python"
            echo "🐍 Python detectado (requirements.txt)"
          elif [ -f "setup.py" ]; then
            LANG="python"
            echo "🐍 Python detectado (setup.py)"
          fi

          if [ -f "version.yml" ]; then
            APP_VERSION=$(grep 'version:' version.yml | awk '{print $2}' | tr -d '"' | tr -d "'" || echo "$APP_VERSION")
            echo "📄 Versión desde version.yml: ${APP_VERSION}"
          fi

          IMAGE_TAG="${{ github.ref_name }}_${APP_VERSION}"

          echo ""
          echo "═══════════════════════════════════"
          echo "  Lenguaje:  ${LANG}"
          echo "  Versión:   ${APP_VERSION}"
          echo "  Tag:       ${IMAGE_TAG}"
          echo "═══════════════════════════════════"

          echo "detected_lang=${LANG}"      >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}"     >> "$GITHUB_OUTPUT"

          RAW_REPO="${{ github.repository }}"
          REPO_LC="${RAW_REPO,,}"
          REPO_LC="${REPO_LC// /}"
          REPO_LC="${REPO_LC//$'\n'/}"
          REPO_LC="${REPO_LC//$'\r'/}"
          echo "repo_lc=${REPO_LC}" >> "$GITHUB_OUTPUT"

  lint-and-test:
    name: 🧹 Lint & 🧪 Test
    needs: detect-language
    uses: ./.github/workflows/shared-lint-test.yml
    with:
      DETECTED_LANG: ${{ needs.detect-language.outputs.detected_lang }}
      CONTEXT_DIR: ${{ inputs.CONTEXT_DIR || '.' }}
    secrets: inherit

  build-and-push:
    name: 🏗️ Build, Push & Sign
    needs: [detect-language, lint-and-test]
    uses: ./.github/workflows/shared-build-push.yml
    with:
      DETECTED_LANG: ${{ needs.detect-language.outputs.detected_lang }}
      IMAGE_TAG: ${{ needs.detect-language.outputs.image_tag }}
      REPO_LC: ${{ needs.detect-language.outputs.repo_lc }}
      CONTEXT_DIR: ${{ inputs.CONTEXT_DIR || '.' }}
      DOCKERFILE_PATH: ${{ inputs.DOCKERFILE_PATH || './Dockerfile' }}
    secrets: inherit

  security-scan:
    name: 🔐 Security Scanning & Reports
    needs: [detect-language, build-and-push]
    uses: ./.github/workflows/shared-security-scan.yml
    with:
      CONTEXT_DIR: ${{ inputs.CONTEXT_DIR || '.' }}
      IMAGE_TAG: ${{ needs.detect-language.outputs.image_tag }}
      REPO_LC: ${{ needs.detect-language.outputs.repo_lc }}
    secrets: inherit