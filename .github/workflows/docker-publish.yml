name: Build and Push Docker Image

on:

  workflow_call:
    inputs:
      CONTEXT_DIR:
        description: 'Directorio del código fuente (contexto de build)'
        required: false
        default: '.'
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      DOCKERHUB_REPO:
        required: true


  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CONTEXT_DIR: ${{ inputs.CONTEXT_DIR || '.' }}
  PLATFORMS: linux/amd64,linux/arm64
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: 🎨 Prepare Registry Names
    runs-on: ubuntu-latest
    outputs:
      docker_image_lc: ${{ steps.lowercase.outputs.docker_image_lc }}
    steps:
      - name: Lowercase image name
        id: lowercase
        run: |
          RAW_DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}"
          DOCKER_IMAGE_LC=$(echo "$RAW_DOCKER_IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "docker_image_lc=${DOCKER_IMAGE_LC}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.docker_image_lc }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT_DIR }}
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ needs.prepare.outputs.docker_image_lc }}:buildcache
          cache-to: type=registry,ref=${{ needs.prepare.outputs.docker_image_lc }}:buildcache,mode=max

      - name: Image digest
        run: echo ${{ steps.build-and-push.outputs.digest }}

  trivy-code-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Infra Actions
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/github-template
          path: .github-template

      - name: Run Trivy Scan
        uses: ./.github-template/.github/trivy
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.CONTEXT_DIR }}'
          output-prefix: 'trivy-fs'
          artifact-name: 'trivy-reports'

  trivy-image-scan:
    runs-on: ubuntu-latest
    needs: 
      - build-and-push
      - prepare
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract metadata for image reference
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.docker_image_lc }}
          tags: |
            type=semver,pattern={{version}}

      - name: Checkout Infra Actions
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/github-template
          path: .github-template

      - name: Run Trivy Scan
        uses: ./.github-template/.github/trivy
        with:
          scan-type: 'image'
          image-ref: ${{ needs.prepare.outputs.docker_image_lc }}:${{ steps.meta.outputs.version || 'latest' }}
          output-prefix: 'trivy-image'
          artifact-name: 'trivy-image-reports'

