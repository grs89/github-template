name: Build and Push Docker Image

on:

  workflow_call:
    inputs:
      CONTEXT_DIR:
        description: 'Directorio del código fuente para detección de versión (eg. pom.xml)'
        required: false
        default: '.'
        type: string
      DOCKERFILE_PATH:
        description: 'Ruta relativa al Dockerfile (ej. ./Dockerfile o ./mi_app/Dockerfile)'
        required: false
        default: './Dockerfile'
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      DOCKERHUB_REPO:
        required: true


  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CONTEXT_DIR: ${{ inputs.CONTEXT_DIR || '.' }}
  DOCKERFILE_PATH: ${{ inputs.DOCKERFILE_PATH || './Dockerfile' }}
  PLATFORMS: linux/amd64,linux/arm64
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Prep Image Name
        id: prep
        env:
          D_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          D_REPO: ${{ secrets.DOCKERHUB_REPO }}
        run: |
          IMG="${D_USER}/${D_REPO}"
          D_LC="${IMG,,}"
          echo "docker_image_lc=${D_LC}" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.docker_image_lc }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          DOCKERFILE="${{ env.DOCKERFILE_PATH }}"
          if [ ! -f "$DOCKERFILE" ] && [ -f "./Dockerfile" ]; then
            echo "⚠️ Dockerfile no encontrado en $DOCKERFILE, usando fallback: ./Dockerfile"
            DOCKERFILE="./Dockerfile"
          fi
          echo "path=${DOCKERFILE}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.prep.outputs.docker_image_lc }}:buildcache
          cache-to: type=registry,ref=${{ steps.prep.outputs.docker_image_lc }}:buildcache,mode=max

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  trivy-code-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Checkout Infra Actions
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/github-template
          path: .github-template

      - name: Run Trivy Scan
        uses: ./.github-template/.github/trivy
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.CONTEXT_DIR }}'
          output-prefix: 'trivy-fs'
          artifact-name: 'trivy-reports'

  trivy-image-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Prep Image Name
        id: prep
        env:
          D_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          D_REPO: ${{ secrets.DOCKERHUB_REPO }}
        run: |
          IMG="${D_USER}/${D_REPO}"
          D_LC="${IMG,,}"
          echo "docker_image_lc=${D_LC}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for image reference
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.docker_image_lc }}
          tags: |
            type=semver,pattern={{version}}

      - name: Checkout Infra Actions
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/github-template
          path: .github-template

      - name: Run Trivy Scan
        uses: ./.github-template/.github/trivy
        with:
          scan-type: 'image'
          image-ref: ${{ steps.prep.outputs.docker_image_lc }}:${{ steps.meta.outputs.version || 'latest' }}
          output-prefix: 'trivy-image'
          artifact-name: 'trivy-image-reports'

